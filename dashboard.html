    // Fungsi otomatis membuat token dan membuka kunci siswa
async function buatTokenReset(nomorPeserta) {
    // 1. Membuat kode token acak (Contoh: "RST-X7B2")
    const tokenAcak = "RST-" + Math.random().toString(36).substring(2, 6).toUpperCase();
    
    try {
        // 2. Kirim otomatis ke database Supabase Anda
        const { error } = await window.clientSupabaseGlobal
            .from('token_ujian')
            .update({ 
                token_aktif: tokenAcak, 
                status_terkunci: true // Tetap terkunci sampai siswa memasukkan token ini
            })
            .eq('nomor_peserta', nomorPeserta);
            
        if (!error) {
            // 3. Tampilkan tokennya di layar laptop guru
            alert("Token baru untuk No. " + nomorPeserta + " adalah: " + tokenAcak);
        }
    } catch (err) {
        console.error(err);
    }
}

    // 2. PENANGANAN KLIK MENU KELOLA APLIKASI (DENGAN PIN)
    if (btnMenuKelola) {
        btnMenuKelola.addEventListener('click', async (e) => {
            e.preventDefault();
            const inputPin = prompt("Masukkan PIN Pengaman Aplikasi untuk Masuk:");
            if (!inputPin) return;
            try {
                const { data: hasilCek, error } = await clientSupabase
                    .from('konfirmasi_keamanan')
                    .select('pin_admin')
                    .eq('id', 1);
                if (error) {
                    alert("Gagal terhubung dengan server pengaman: " + error.message);
                    return;
                }
                if (!hasilCek || hasilCek.length === 0) {
                    const { error: errorInsert } = await clientSupabase
                        .from('konfirmasi_keamanan')
                        .insert([{ id: 1, pin_admin: inputPin.trim() }]);

                    return;

                bukaFormKelolaAplikasi();

                alert("Terjadi kesalahan sistem PIN: " + err.message);

        `;
        link.onclick = function(e) {

            bukaFormKelolaAplikasi();

        container.innerHTML = "";

            .from('pertemuan')
            .select('*')
            .order('urutan', { ascending: true });
        if (daftarPertemuan) {
            daftarPertemuan.forEach(item => { renderItemPertemuan(item); });

                wadahOpsi.innerHTML = `<div class="form-group"><label>Kunci Benar/Salah</label><select id="kunciJawaban"><option value="Benar">Benar</option><option value="Salah">Salah</option></select></div>`;
            } else if (jenis === 'isian_singkat') {
                wadahOpsi.innerHTML = `<div class="form-group"><label>Kunci Isian Singkat</label><input type="text" id="kunciJawaban" placeholder="Contoh kunci presisi: wr supratman" required></div>`;
            }
        }
        
        selectJenis.addEventListener('change', sesuaikanInputJawaban);
        sesuaikanInputJawaban();
        
const tbody = document.querySelector("#tabelManajemenSoal tbody");
if (!semuaSoal || semuaSoal.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:20px; color:#94a3b8;">Belum ada data soal di server database cloud.</td></tr>`;
} else {
    semuaSoal.forEach(soal => {
        const tr = document.createElement('tr');
        // Mengamankan karakter kutip agar struktur string JSON tidak pecah
        const soalAman = JSON.stringify(soal).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        
        tr.innerHTML = `
            <td style="font-weight:600; color:#334155;">${soal.pertanyaan}</td>
            <td><span style="background:#e2e8f0; color:#475569; padding:3px 8px; border-radius:12px; font-size:11px; font-weight:600;">${soal.jenis_soal.replace('_',' ')}</span></td>
            <td><div style="display:flex; gap:6px;">
                <button onclick="isiDataFormEdit('${soalAman}')" style="padding:5px 10px; background:#3b82f6; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; font-size:12px;">Edit</button>
                <button onclick="hapusSoalCloud(${soal.id})" style="padding:5px 10px; background:#ef4444; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:600; font-size:12px;">Hapus</button>
            </div></td>
        `;
        tbody.appendChild(tr);
    });
}

        document.getElementById('formTambahSoal').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editSoalId').value;
            const pertemuanId = document.getElementById('selectPertemuan').value;
            const jenisSoal = selectJenis.value;
            const pertanyaan = document.getElementById('inputPertanyaan').value.trim();
            let pilihanJawaban = [];
            let kunciJawaban = document.getElementById('kunciJawaban').value.trim();
            
            if (jenisSoal === 'pilihan_ganda') {
                pilihanJawaban = [
                    document.getElementById('opsiA').value.trim(), 
                    document.getElementById('opsiB').value.trim(), 
                    document.getElementById('opsiC').value.trim(), 
                    document.getElementById('opsiD').value.trim(),
                    document.getElementById('opsiE').value.trim()
                ];
            }
            
            let errorDb;
            if (editId) {
                const res = await clientSupabase.from('soal').update({ 
                    pertemuan_id: pertemuanId, jenis_soal: jenisSoal, pertanyaan: pertanyaan, pilihan_jawaban: pilihanJawaban, kunci_jawaban: kunciJawaban 
                }).eq('id', editId);
                errorDb = res.error;
            } else {
                const res = await clientSupabase.from('soal').insert([{ 
                    pertemuan_id: pertemuanId, jenis_soal: jenisSoal, pertanyaan: pertanyaan, pilihan_jawaban: pilihanJawaban, kunci_jawaban: kunciJawaban 
                }]);
                errorDb = res.error;
            }
            
            if (errorDb) {
                alert("Gagal memproses data ke database: " + errorDb.message);
            } else { 
                alert("Sukses mengamankan perubahan ke Cloud!"); 
                bukaFormKelolaAplikasi(); 
            }
        });
    }

window.isiDataFormEdit = function(soalString) {
    const soal = JSON.parse(soalString.replace(/&quot;/g, '"').replace(/&#39;/g, "'"));
    document.getElementById('editSoalId').value = soal.id;
    document.getElementById('selectPertemuan').value = soal.pertemuan_id;
    document.getElementById('selectJenisSoal').value = soal.jenis_soal;
    document.getElementById('selectJenisSoal').dispatchEvent(new Event('change'));
    document.getElementById('inputPertanyaan').value = soal.pertanyaan;
    
    if (soal.jenis_soal === 'pilihan_ganda' && Array.isArray(soal.pilihan_jawaban)) {
        document.getElementById('opsiA').value = soal.pilihan_jawaban[0] || '';
        document.getElementById('opsiB').value = soal.pilihan_jawaban[1] || '';
        document.getElementById('opsiC').value = soal.pilihan_jawaban[2] || '';
        document.getElementById('opsiD').value = soal.pilihan_jawaban[3] || '';
        document.getElementById('opsiE').value = soal.pilihan_jawaban[4] || '';
    }
    document.getElementById('kunciJawaban').value = soal.kunci_jawaban;
    document.getElementById('btnSimpanForm').innerText = "Update & Simpan Perubahan";
    document.getElementById('formTambahSoal').scrollIntoView({ behavior: 'smooth' });
};

window.hapusSoalCloud = async function(id) {
    if (!confirm("Apakah Anda yakin ingin menghapus permanen data soal ini dari server?")) return;
    const { error } = await clientSupabase.from('soal').delete().eq('id', id);
    if (error) {
        alert("Gagal menghapus data: " + error.message);
    } else { 
        alert("Soal berhasil dihapus!"); 
        bukaFormKelolaAplikasi(); 
    }
};

    ambilSemuaPertemuan();
});
</script>
